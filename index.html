<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mecenat App</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  height:100vh;
}

section{
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  transition:opacity .6s ease;
}

/* ---- page states ---- */
.hidden{
  opacity:0;
  pointer-events:none;
  z-index:0;
}

.active{
  opacity:1;
  pointer-events:auto;
  z-index:2;
}

/* first page */
#home{
  background-image:url('background.jpg');
  background-size:contain;
  background-position:center;
  background-repeat:no-repeat;
  background-color:white;
}

/* navigation buttons */
.navBtn{
  position:absolute;
  padding:14px 20px;
  border-radius:10px;
  border:none;
  background:rgba(0,0,0,.4);
  color:white;
  font-size:14px;
}

/* bottom center */
.centerBtn{
  bottom:60px;
  left:50%;
  transform:translateX(-50%);
}

/* top left */
.topLeft{
  top:20px;
  left:20px;
}

/* images */
img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

video{
  position:absolute;
  top:68vh;
  left:31vw;
  width:32vw;
  max-width:150px;
  transform:translate(-50%,-50%);
  border-radius:12px;
}
</style>
</head>

<body>

<!-- FIRST -->
<section id="home" class="active">
  <button class="navBtn centerBtn" onclick="goToSecond()">Go to My Page</button>
</section>

<!-- SECOND -->
<section id="second" class="hidden">
  <button class="navBtn topLeft" onclick="goToThird()">Next</button>

  <img src="RQ_2026.jpg">
  <video src="SL_logo.mp4" autoplay muted loop playsinline></video>
</section>

<!-- THIRD -->
<section id="third" class="hidden">
  <button class="navBtn topLeft" onclick="goToSecond()">Back</button>

  <!-- your third screen image -->
  <img src="Third_RQ.png">
</section>

<script>
function switchPage(from,to){
  from.classList.remove("active");
  from.classList.add("hidden");

  setTimeout(()=>{
    to.classList.remove("hidden");
    to.classList.add("active");
  },600);
}

function goToSecond(){
  switchPage(
    document.getElementById("home"),
    document.getElementById("second")
  );
}

function goToThird(){
  switchPage(
    document.getElementById("second"),
    document.getElementById("third")
  );
}
</script>

</body>
</html>
